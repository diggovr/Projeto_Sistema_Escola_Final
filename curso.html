<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos — RS Sistema Escolar</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8B1A2B">
</head>
<body>

  <!-- ── Header ── -->
  <header class="rs-header">
    <div class="rs-logo">RS</div>
    <div class="rs-header-text">
      <h1>Cursos</h1>
      <p>Gerenciar catálogo</p>
    </div>
    <a href="index.html" style="margin-left:auto; background:none; border:1px solid var(--border);
      border-radius:6px; padding:5px 10px; font-size:11px; color:var(--brand);
      text-decoration:none; font-family:'DM Sans',sans-serif;">← Início</a>
  </header>

  <div class="rs-content fade-in">

    <!-- ── Formulário de cadastro ── -->
    <p class="rs-form-title">Novo Curso</p>
    <p class="rs-form-subtitle">Preencha os dados do curso</p>

    <div class="rs-alert-err" id="err-curso"></div>
    <div class="rs-alert-ok"  id="ok-curso"></div>

    <!-- Nome do curso -->
    <div class="rs-field">
      <label class="rs-label" for="nome">Nome do curso <span class="req">*</span></label>
      <input class="rs-input" type="text" id="nome" placeholder="Análise e Desenvolvimento de Sistemas">
    </div>

    <!-- Descrição -->
    <div class="rs-field">
      <label class="rs-label" for="descricao">Descrição</label>
      <input class="rs-input" type="text" id="descricao" placeholder="Breve descrição do curso">
    </div>

    <!-- Carga horária e modalidade lado a lado -->
    <div class="rs-row">
      <div class="rs-field">
        <label class="rs-label" for="carga_horaria">Carga horária</label>
        <input class="rs-input" type="number" id="carga_horaria" placeholder="Ex: 1600">
      </div>
      <div class="rs-field">
        <label class="rs-label" for="modalidade">Modalidade</label>
        <select class="rs-select" id="modalidade">
          <option value="Presencial">Presencial</option>
          <option value="EAD">EAD</option>
          <option value="Híbrido">Híbrido</option>
        </select>
      </div>
    </div>

    <button class="rs-btn" id="btn-salvar">Cadastrar Curso</button>

    <!-- ── Lista de cursos ── -->
    <hr class="rs-divider">
    <p class="rs-divider-label">Cursos cadastrados</p>

    <div id="lista-cursos">
      <div class="rs-empty">
        <div class="rs-empty-icon">📚</div>
        Carregando cursos…
      </div>
    </div>

  </div>

  <!-- ── Navegação inferior ── -->
  <nav class="rs-nav">
    <a class="rs-nav-btn" href="index.html" data-page="index">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Início
    </a>
    <a class="rs-nav-btn" href="aluno.html" data-page="aluno">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
      </svg>
      Alunos
    </a>
    <a class="rs-nav-btn active" href="curso.html" data-page="curso">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
      </svg>
      Cursos
    </a>
    <a class="rs-nav-btn" href="usuario.html" data-page="usuario">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Usuários
    </a>
    <a class="rs-nav-btn" href="relatorio.html" data-page="relatorio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2z"/>
        <path d="M15 5v14a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2h-2a2 2 0 00-2 2z"/>
        <path d="M9 10V5a2 2 0 012-2h2a2 2 0 012 2v5"/>
      </svg>
      Relatório
    </a>
  </nav>


  <script src="js/app.js"></script>
  <script>
    checkAuth();

    /** Renderiza lista de cursos */
    async function renderCursos() {
      const lista = document.getElementById('lista-cursos');
      const cursos = await getCursos();

      if (cursos.length === 0) {
        lista.innerHTML = `
          <div class="rs-empty">
            <div class="rs-empty-icon">📚</div>
            Nenhum curso cadastrado ainda.
          </div>`;
        return;
      }

      lista.innerHTML = cursos.map(c => `
        <div class="rs-list-item">
          <div class="rs-avatar av-curso">📚</div>
          <div class="rs-list-info">
            <div class="rs-list-name">${c.nome}</div>
            <div class="rs-list-sub">${c.modalidade} · ${c.carga_horaria ? c.carga_horaria + 'h' : '—'}</div>
          </div>
          <button class="rs-btn-icon" onclick="removerCurso(${c.id})">🗑</button>
        </div>
      `).join('');
    }

    /** Salva novo curso via API */
    document.getElementById('btn-salvar').addEventListener('click', async () => {
      const nome          = document.getElementById('nome').value.trim();
      const descricao     = document.getElementById('descricao').value.trim();
      const carga_horaria = document.getElementById('carga_horaria').value;
      const modalidade    = document.getElementById('modalidade').value;

      if (!nome) {
        showError('err-curso', 'O nome do curso é obrigatório.');
        return;
      }

      try {
        // POST /cursos
        await postCurso({ nome, descricao, carga_horaria: Number(carga_horaria) || null, modalidade });
        showSuccess('ok-curso', `Curso "${nome}" cadastrado!`);

        // Limpa campos
        document.getElementById('nome').value = '';
        document.getElementById('descricao').value = '';
        document.getElementById('carga_horaria').value = '';

        renderCursos();
      } catch (err) {
        showError('err-curso', err.message);
      }
    });

    /** Remove curso por id */
    async function removerCurso(id) {
      if (!confirm('Excluir este curso?')) return;
      try {
        await deleteCurso(id);
        renderCursos();
      } catch (err) {
        showError('err-curso', err.message);
      }
    }

    renderCursos();
  </script>
</body>
</html>
